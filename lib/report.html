<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>desktop-scripts state</title>

<!--
  The page doctor.sh --html renders. It is a whole file rather than a heredoc so
  the markup, CSS and grouping logic can be edited as markup instead of as shell
  quoting.

  doctor.sh replaces the DATA placeholder below with the same JSON that
  ./doctor.sh --json prints, and nothing else. No build step, no network, no
  webfonts: a saved copy keeps working offline, which is the point of handing
  someone a single file.

  Design notes, so the next edit does not undo them by accident:

  - Every string here was emitted by a program, and Solarized is a terminal
    palette, so the page is set entirely in monospace and reads as an instrument
    readout rather than a dashboard. The type scale does the work that boxes and
    extra colour would otherwise do.
  - The signature is the status rail: the bar down the left of each section and
    each nested group carries the worst status inside it, so the left edge can be
    scanned for trouble without reading any text. It is the one loud element;
    everything else stays quiet on purpose.
  - Grouping is by surface tone (base3 on base2, base03 on base02) rather than a
    border around every box.
  - Every level of the tree is a <details>, including the module, so one control
    in the masthead can fold the whole page. The button names what the click
    will do rather than what the page currently is.
  - There is no page-load animation. This page is regenerated constantly, and
    watching it assemble each time would be friction rather than delight.
-->

<style>
  /* Solarized (Ethan Schoonover). The two variants share one set of accent hues
     and differ only in the base tones, which is the property this report wants:
     ok, warn and fail keep the same colour in both.

       base03 #002b36   base02 #073642   base01 #586e75   base00 #657b83
       base0  #839496   base1  #93a1a1   base2  #eee8d5   base3  #fdf6e3

     Surfaces take the "background" role (base3 / base03) and the page takes
     "background highlights" (base2 / base02), so a surface reads as raised.

     Text is one step toward contrast from the documented roles. The spec puts
     secondary content at base0, which measures 2.9:1 on base3 and is not
     readable for the detail column that carries paths and versions. Labels take
     the emphasized tone and details the body tone: 5.0:1 and 4.1:1 on light,
     5.6:1 and 4.7:1 on dark, all measured rather than eyeballed.

     The accents stay canonical. On light they measure 3.0:1, below AA for small
     text -- a known cost of Solarized's accents on base3, tolerable only because
     every status is spelled out in words as well as colour. Do not "fix" it with
     off-palette hues; either accept it or change scheme.

     Declared three times: the default follows the system, and [data-theme] pins
     it, which has to win in both directions. */
  :root, :root[data-theme="light"] {
    color-scheme: light;
    --page: #eee8d5; --surface: #fdf6e3; --sunk: #e8e0cb;
    --ink: #586e75; --dim: #657b83; --rule: #ddd6c1;
    --ok: #859900; --warn: #b58900; --fail: #dc322f; --blocked: #93a1a1;
    --focus: #268bd2;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      color-scheme: dark;
      --page: #073642; --surface: #002b36; --sunk: #01212a;
      --ink: #93a1a1; --dim: #839496; --rule: #0d4753;
      --ok: #859900; --warn: #b58900; --fail: #dc322f; --blocked: #586e75;
      --focus: #268bd2;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --page: #073642; --surface: #002b36; --sunk: #01212a;
    --ink: #93a1a1; --dim: #839496; --rule: #0d4753;
    --ok: #859900; --warn: #b58900; --fail: #dc322f; --blocked: #586e75;
    --focus: #268bd2;
  }

  * { box-sizing: border-box; }

  /* One family, no webfonts. Adwaita Mono leads because this repo builds a GNOME
     desktop, where it is the system monospace. */
  body {
    margin: 0;
    padding: clamp(1.5rem, 4vw, 3.5rem) clamp(1rem, 4vw, 2rem) 5rem;
    background: var(--page);
    color: var(--ink);
    font-family: ui-monospace, "Adwaita Mono", "JetBrains Mono", "DejaVu Sans Mono",
                 SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13.5px;
    line-height: 1.6;
    font-variant-numeric: tabular-nums;
  }
  main { max-width: 62rem; margin: 0 auto; }

  :where(a, button, summary):focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }

  /* --- masthead ---------------------------------------------------------- */

  .top { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2.25rem; }
  .eyebrow {
    flex: 1; margin: 0;
    font-size: .6875rem; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase; color: var(--dim);
  }
  .top button {
    background: none; color: var(--dim); border: 1px solid var(--rule);
    border-radius: 2px; padding: .25rem .6rem;
    font: inherit; font-size: .6875rem; letter-spacing: .08em;
    cursor: pointer;
  }
  .top button:hover { color: var(--ink); border-color: var(--dim); }

  /* The verdict is the hero. The page exists to answer one question, so it
     answers it in a sentence before showing any of the working. */
  .verdict {
    margin: 0 0 .4rem;
    font-size: clamp(1.4rem, 3.6vw, 2.1rem);
    font-weight: 700;
    letter-spacing: -.015em;
    line-height: 1.2;
  }
  .verdict.ok { color: var(--ok); }
  .verdict.warn { color: var(--warn); }
  .verdict.fail { color: var(--fail); }
  .meta { margin: 0 0 1rem; color: var(--dim); font-size: .8125rem; }

  .tally { display: flex; flex-wrap: wrap; gap: 1.25rem; margin-bottom: 2.5rem;
           font-size: .8125rem; color: var(--dim); }
  .tally b { font-weight: 700; color: var(--ink); }
  /* The rail mark again, reused as the legend's bullet, so the colour is learned
     here and recognised down the left edge below. */
  .tally i { display: inline-block; width: .3rem; height: .8em; margin-right: .45rem;
             vertical-align: -.05em; border-radius: 1px; background: currentColor; }
  .t-ok { color: var(--ok); } .t-warn { color: var(--warn); }
  .t-fail { color: var(--fail); } .t-blocked { color: var(--blocked); }

  /* --- sections and groups ------------------------------------------------ */

  /* The rail. A section or group is a surface with a coloured left border
     showing the worst status inside it; nesting adds another rail further in, so
     severity stays visible at the edge at every depth. */
  details.mod, details.grp {
    border-left: 3px solid var(--rail, var(--rule));
    background: var(--surface);
  }
  details.mod { margin-bottom: 1.25rem; }
  details.grp { background: none; margin-left: 1.25rem; }
  details.grp + details.grp { margin-top: 1px; }

  /* Every level is a disclosure, so the whole tree folds the same way and one
     control can drive all of it. */
  details.mod > summary {
    padding: .75rem 1rem;
    font-size: .6875rem; letter-spacing: .2em;
    text-transform: uppercase; color: var(--dim);
  }
  details.mod[open] > summary { border-bottom: 1px solid var(--rule); }

  summary {
    display: flex; align-items: baseline; gap: .5rem;
    padding: .5rem 1rem; cursor: pointer;
    font-weight: 700; color: var(--ink);
  }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "+"; color: var(--dim); width: .75rem; flex: none; font-weight: 400; }
  details[open] > summary::before { content: "\2212"; }
  summary:hover { background: var(--sunk); }
  .counts { margin-left: auto; display: flex; gap: .75rem; font-size: .75rem; font-weight: 400; }

  /* --- rows --------------------------------------------------------------- */

  .row {
    display: grid;
    grid-template-columns: 4rem minmax(8rem, 15rem) 1fr;
    gap: .25rem 1rem;
    padding: .3rem 1rem;
    align-items: baseline;
  }
  details.grp .row { padding-left: 1.75rem; }
  .badge { font-size: .75rem; letter-spacing: .06em; }
  .ok .badge { color: var(--ok); } .warn .badge { color: var(--warn); }
  .fail .badge { color: var(--fail); } .blocked .badge { color: var(--blocked); }
  /* The label is not re-coloured by status: the rail and the badge already say
     it, and a third telling only makes the page louder. */
  .label { color: var(--ink); }
  .detail { color: var(--dim); overflow-wrap: anywhere; }

  /* The fix is a command you run, so it is written like one. */
  .fix { grid-column: 2 / -1; color: var(--dim); font-size: .8125rem; }
  .fix code { color: var(--ink); overflow-wrap: anywhere; }
  .fix::before { content: "$ "; color: var(--dim); }
  .fix.watch::before { content: "watch: "; letter-spacing: .04em; }

  @media (max-width: 40rem) {
    .row { grid-template-columns: 3.5rem 1fr; }
    .fix { grid-column: 1 / -1; }
    details.grp { margin-left: .5rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>

<main>
  <div class="top">
    <p class="eyebrow">desktop-scripts &middot; state</p>
    <button id="fold" type="button"></button>
    <button id="theme" type="button" title="solarized light / dark / follow system"></button>
  </div>
  <p class="verdict" id="verdict"></p>
  <p class="meta" id="meta"></p>
  <div class="tally" id="tally"></div>
  <div id="modules"></div>
</main>

<script id="state" type="application/json">{{DATA}}</script>
<script>
  const state = JSON.parse(document.getElementById("state").textContent);

  const el = (tag, cls, text) => {
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  };

  // Worst first: a rail shows the most serious thing inside it, which is the
  // only ordering that lets the left edge be scanned instead of read.
  const SEVERITY = ["fail", "warn", "blocked", "ok"];
  const worst = (t) => SEVERITY.find((s) => t[s] > 0) || "ok";

  /* --- masthead ---------------------------------------------------------- */

  const s = state.summary;
  const plural = (n, one, many) => `${n} ${n === 1 ? one : many}`;
  const verdict = document.getElementById("verdict");
  if (s.fail) {
    verdict.textContent = `${plural(s.fail, "check has", "checks have")} failed.`;
    verdict.classList.add("fail");
  } else if (s.warn) {
    verdict.textContent = `${plural(s.warn, "check needs", "checks need")} attention.`;
    verdict.classList.add("warn");
  } else {
    verdict.textContent = "Everything the repo declares is in place.";
    verdict.classList.add("ok");
  }

  document.getElementById("meta").textContent = `${state.host} · ${state.generated}`;

  const tally = document.getElementById("tally");
  for (const [key, one, many] of [["ok", "ok", "ok"], ["warn", "warning", "warnings"],
                                  ["fail", "failed", "failed"],
                                  ["blocked", "blocked", "blocked"]]) {
    if (!s[key] && key === "blocked") continue;   // rare; do not show a zero
    const item = el("span", `t-${key}`);
    item.append(el("i"), el("b", null, s[key]),
                document.createTextNode(` ${s[key] === 1 ? one : many}`));
    tally.append(item);
  }

  /* --- theme -------------------------------------------------------------- */

  // Three states, not two: following the desktop has to stay reachable after a
  // choice has been made.
  const THEMES = ["system", "light", "dark"];
  const button = document.getElementById("theme");
  const applyTheme = (name) => {
    if (name === "system") document.documentElement.removeAttribute("data-theme");
    else document.documentElement.setAttribute("data-theme", name);
    button.textContent = `theme: ${name}`;
    try { localStorage.setItem("theme", name); } catch { /* private mode */ }
  };
  let theme = "system";
  try { theme = localStorage.getItem("theme") || "system"; } catch { /* ignore */ }
  if (!THEMES.includes(theme)) theme = "system";
  applyTheme(theme);
  button.addEventListener("click", () => {
    theme = THEMES[(THEMES.indexOf(theme) + 1) % THEMES.length];
    applyTheme(theme);
  });

  /* --- tree ---------------------------------------------------------------- */

  // Rows arrive flat, each carrying a "/"-separated group path. Build the tree in
  // insertion order so the page keeps the order the checks ran in.
  const tree = () => ({ rows: [], kids: new Map() });
  const at = (node, path) =>
    path.reduce((n, part) => {
      if (!n.kids.has(part)) n.kids.set(part, tree());
      return n.kids.get(part);
    }, node);

  const byModule = new Map();
  for (const c of state.checks) {
    if (!byModule.has(c.module)) byModule.set(c.module, tree());
    const path = c.group ? c.group.split("/").filter(Boolean) : [];
    at(byModule.get(c.module), path).rows.push(c);
  }

  const tallyOf = (node) => {
    const t = { ok: 0, warn: 0, fail: 0, blocked: 0 };
    for (const r of node.rows) t[r.status] = (t[r.status] || 0) + 1;
    for (const kid of node.kids.values()) {
      const k = tallyOf(kid);
      for (const key of Object.keys(t)) t[key] += k[key];
    }
    return t;
  };

  const renderRow = (c) => {
    const row = el("div", `row ${c.status}`);
    row.append(el("span", "badge", c.status),
               el("span", "label", c.label),
               el("span", "detail", c.detail));
    if (c.fix) {
      const fix = el("div", c.status === "blocked" ? "fix watch" : "fix");
      fix.append(el("code", null, c.fix));
      row.append(fix);
    }
    return row;
  };

  const renderNode = (node, into) => {
    node.rows.forEach((c) => into.append(renderRow(c)));
    for (const [name, kid] of node.kids) {
      const t = tallyOf(kid);
      const d = el("details", "grp");
      d.open = true;
      d.style.setProperty("--rail", `var(--${worst(t)})`);
      const sum = el("summary", null, name);
      const counts = el("span", "counts");
      for (const status of SEVERITY) {
        if (t[status]) counts.append(el("span", `t-${status}`, `${t[status]} ${status}`));
      }
      sum.append(counts);
      d.append(sum);
      renderNode(kid, d);
      into.append(d);
    }
  };

  const modules = document.getElementById("modules");
  for (const [name, node] of byModule) {
    const t = tallyOf(node);
    const sec = el("details", "mod");
    sec.open = true;
    sec.style.setProperty("--rail", `var(--${worst(t)})`);
    const sum = el("summary", null, name);
    const counts = el("span", "counts");
    for (const status of SEVERITY) {
      if (t[status]) counts.append(el("span", `t-${status}`, `${t[status]} ${status}`));
    }
    sum.append(counts);
    sec.append(sum);
    renderNode(node, sec);
    modules.append(sec);
  }

  /* --- fold ---------------------------------------------------------------- */

  // The label names what the click will do, not what the page currently is, and
  // it tracks the tree so folding the last group by hand flips it to "expand
  // all" rather than leaving a button that does nothing.
  const fold = document.getElementById("fold");
  const allDetails = () => document.querySelectorAll("#modules details");
  const syncFold = () => {
    const anyOpen = [...allDetails()].some((d) => d.open);
    fold.textContent = anyOpen ? "collapse all" : "expand all";
    fold.dataset.action = anyOpen ? "collapse" : "expand";
  };
  fold.addEventListener("click", () => {
    const open = fold.dataset.action === "expand";
    allDetails().forEach((d) => { d.open = open; });
    syncFold();
  });
  // `toggle` does not bubble, so each disclosure is listened to directly.
  allDetails().forEach((d) => d.addEventListener("toggle", syncFold));
  syncFold();
</script>

<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>desktop-scripts state</title>

<!--
  The report doctor.sh --html renders. It is a whole file rather than a heredoc
  so the markup, CSS and grouping logic can be edited and previewed as markup
  instead of as shell quoting.

  doctor.sh replaces the DATA placeholder below with the same JSON that
  ./doctor.sh --json prints, and nothing else. No build step, no network: a
  saved copy of this page keeps working offline, which is the point of handing
  someone a single file.

  Rows carry a "/"-separated group path. The renderer nests by it, so an app's
  checks sit under the app and related apps sit under their shared group.
-->

<style>
  /* Light is sepia rather than white: this is a page you read, and the paper
     tone is easier to sit with than a lit panel. Themes are declared three
     times over -- the default follows the system, and [data-theme] pins it
     when the reader has chosen, which has to win in both directions. */
  :root, :root[data-theme="sepia"] {
    color-scheme: light;
    --bg: #f2e9d8; --fg: #3b3229; --muted: #7c6a53; --card: #fbf5e7; --line: #e0d3ba;
    --ok: #3f6f3a; --warn: #8a6410; --fail: #a4382a;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      color-scheme: dark;
      --bg: #17171a; --fg: #e8e8e6; --muted: #9a9a95; --card: #1f1f23; --line: #2e2e34;
      --ok: #6fcf97; --warn: #e0b341; --fail: #f2836b;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #17171a; --fg: #e8e8e6; --muted: #9a9a95; --card: #1f1f23; --line: #2e2e34;
    --ok: #6fcf97; --warn: #e0b341; --fail: #f2836b;
  }
  .head { display: flex; align-items: flex-start; gap: 1rem; }
  .head h1 { flex: 1; }
  #theme { background: var(--card); color: var(--fg); border: 1px solid var(--line);
           border-radius: .4rem; padding: .35rem .7rem; font: inherit; font-size: .8rem;
           cursor: pointer; }
  #theme:hover { border-color: var(--muted); }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 2rem 1.25rem 4rem; background: var(--bg); color: var(--fg);
         font: 15px/1.55 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
  main { max-width: 60rem; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
  .sub { color: var(--muted); font-size: .875rem; margin-bottom: 1.5rem; }
  .tiles { display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 2rem; }
  .tile { flex: 1 1 8rem; background: var(--card); border: 1px solid var(--line);
          border-radius: .6rem; padding: .85rem 1rem; }
  .tile b { display: block; font-size: 1.6rem; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .tile span { color: var(--muted); font-size: .8rem; }
  section { background: var(--card); border: 1px solid var(--line); border-radius: .6rem;
            margin-bottom: 1rem; overflow: hidden; }
  h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
       margin: 0; padding: .7rem 1rem; border-bottom: 1px solid var(--line); }

  /* A group is a <details> so a long module can be folded away. Open by
     default: the report is for reading, not for clicking through. */
  details.grp { border-bottom: 1px solid var(--line); }
  details.grp:last-child { border-bottom: 0; }
  summary { cursor: pointer; padding: .5rem 1rem; font-weight: 500;
            display: flex; align-items: center; gap: .5rem; }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "▾"; color: var(--muted); font-size: .75rem; width: .75rem; }
  details:not([open]) > summary::before { content: "▸"; }
  /* Nested groups indent by depth rather than by nesting-specific rules. */
  .grp .grp { border-bottom: 0; }
  .grp .grp > summary { padding-left: 2rem; }
  .grp .grp .grp > summary { padding-left: 3rem; }
  .counts { margin-left: auto; display: flex; gap: .4rem; font-size: .75rem;
            font-weight: 400; font-variant-numeric: tabular-nums; }
  .counts .n-ok { color: var(--ok); } .counts .n-warn { color: var(--warn); }
  .counts .n-fail { color: var(--fail); } .counts .n-blocked { color: var(--muted); }

  .row { display: grid; grid-template-columns: 4.5rem minmax(9rem, 14rem) 1fr;
         gap: .75rem; padding: .55rem 1rem; border-top: 1px solid var(--line);
         align-items: baseline; }
  .grp .row { padding-left: 2rem; }
  .grp .grp .row { padding-left: 3rem; }
  .badge { font-size: .7rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
  .ok .badge { color: var(--ok); } .warn .badge { color: var(--warn); }
  .fail .badge { color: var(--fail); } .blocked .badge { color: var(--muted); }
  .label { font-weight: 500; }
  .detail { color: var(--muted); overflow-wrap: anywhere; }
  .fix { grid-column: 2 / -1; margin-top: .3rem; font-size: .82rem; }
  .fix code { background: var(--bg); border: 1px solid var(--line); border-radius: .3rem;
              padding: .1rem .35rem; font-size: .95em; overflow-wrap: anywhere; }
  @media (max-width: 34rem) {
    .row { grid-template-columns: 4.5rem 1fr; }
    .fix { grid-column: 1 / -1; }
  }
</style>

<main>
  <div class="head">
    <h1>desktop-scripts state</h1>
    <button id="theme" type="button" title="sepia / dark / follow system"></button>
  </div>
  <div class="sub" id="sub"></div>
  <div class="tiles" id="tiles"></div>
  <div id="modules"></div>
</main>

<script id="state" type="application/json">{{DATA}}</script>
<script>
  const state = JSON.parse(document.getElementById("state").textContent);

  const el = (tag, cls, text) => {
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  };

  document.getElementById("sub").textContent = `${state.host} · ${state.generated}`;

  // Three states, not two: "system" has to be reachable again after choosing,
  // otherwise the first click permanently opts out of following the desktop.
  const THEMES = ["system", "sepia", "dark"];
  const button = document.getElementById("theme");
  const applyTheme = (name) => {
    if (name === "system") document.documentElement.removeAttribute("data-theme");
    else document.documentElement.setAttribute("data-theme", name);
    button.textContent = name === "system" ? "theme: system" : `theme: ${name}`;
    try { localStorage.setItem("theme", name); } catch { /* private mode */ }
  };
  let current = "system";
  try { current = localStorage.getItem("theme") || "system"; } catch { /* ignore */ }
  if (!THEMES.includes(current)) current = "system";
  applyTheme(current);
  button.addEventListener("click", () => {
    current = THEMES[(THEMES.indexOf(current) + 1) % THEMES.length];
    applyTheme(current);
  });

  for (const [key, label] of [["fail", "failed"], ["warn", "warnings"],
                              ["ok", "ok"], ["blocked", "blocked"]]) {
    const tile = el("div", "tile");
    tile.append(el("b", null, state.summary[key]), el("span", null, label));
    document.getElementById("tiles").append(tile);
  }

  // Rows arrive flat, each carrying a "/"-separated group path. Build the tree
  // in insertion order so the page preserves the order the checks ran in.
  const tree = () => ({ rows: [], kids: new Map() });
  const at = (node, path) =>
    path.reduce((n, part) => {
      if (!n.kids.has(part)) n.kids.set(part, tree());
      return n.kids.get(part);
    }, node);

  const byModule = new Map();
  for (const c of state.checks) {
    if (!byModule.has(c.module)) byModule.set(c.module, tree());
    const path = c.group ? c.group.split("/").filter(Boolean) : [];
    at(byModule.get(c.module), path).rows.push(c);
  }

  // A group's badge counts everything beneath it, so a collapsed group still
  // says whether anything inside needs attention.
  const tally = (node) => {
    const t = { ok: 0, warn: 0, fail: 0, blocked: 0 };
    for (const r of node.rows) t[r.status] = (t[r.status] || 0) + 1;
    for (const kid of node.kids.values()) {
      const k = tally(kid);
      for (const s of Object.keys(t)) t[s] += k[s];
    }
    return t;
  };

  const renderRow = (c) => {
    const row = el("div", `row ${c.status}`);
    row.append(el("span", "badge", c.status),
               el("span", "label", c.label),
               el("span", "detail", c.detail));
    if (c.fix) {
      const fix = el("div", "fix", c.status === "blocked" ? "track: " : "fix: ");
      fix.append(el("code", null, c.fix));
      row.append(fix);
    }
    return row;
  };

  const renderNode = (node, into) => {
    node.rows.forEach((c) => into.append(renderRow(c)));
    for (const [name, kid] of node.kids) {
      const d = el("details", "grp");
      d.open = true;
      const s = el("summary", null, name);
      const counts = el("span", "counts");
      const t = tally(kid);
      for (const status of ["fail", "warn", "blocked", "ok"]) {
        if (t[status]) counts.append(el("span", `n-${status}`, `${t[status]} ${status}`));
      }
      s.append(counts);
      d.append(s);
      renderNode(kid, d);
      into.append(d);
    }
  };

  const modules = document.getElementById("modules");
  for (const [name, node] of byModule) {
    const sec = el("section");
    sec.append(el("h2", null, name));
    renderNode(node, sec);
    modules.append(sec);
  }
</script>

# Per-application overrides -> ~/.config/keyd/app.conf
#
# Read by the keyd-application-mapper daemon, which needs the GNOME Shell
# extension bundled with keyd to learn the focused window on Wayland.
# See ../../docs/decisions/0002-macos-keybindings.md and ./gnome-wayland-bridge.md
#
# Syntax notes (from keyd-application-mapper.scdoc):
#   [<class>] or [<class>|<title>], unix wildcards (*) allowed.
#   The class is NORMALIZED first: non-alphanumerics collapse to '-', lowercased.
#   So wm_class 'org.gnome.Ptyxis' is written [org-gnome-ptyxis].
#   Run `keyd-application-mapper -v` (or tail ~/.config/keyd/app.log) to see the
#   exact normalized class for a window before guessing.
#
#   Comments must sit on their own line. keyd has no trailing-comment syntax:
#   it takes the rest of the line as the action, so a commented binding parses
#   as invalid and is dropped without failing the file.
#
#   Each line is `<layer>.<key> = <action>` -- the `keyd bind` grammar.
#   There is NO directive to disable a layer for an app; you override the
#   individual bindings instead. Non-matching apps revert to /etc/keyd/default.conf.
#   All matching sections are applied cumulatively, later ones winning.

# --- Terminals -------------------------------------------------------------
# Cmd+C must copy, not send SIGINT, and must not collide with the physical
# Ctrl+C that stays SIGINT. Ctrl+Shift+C/V is the terminal convention.

[org-gnome-ptyxis]

# Hand the nav layer's keys back to the shell: Ctrl+A is the tmux prefix and
# Ctrl+E/B/F/P/N are readline. default.conf keeps the genuinely dangerous keys
# out of that layer, so this is a second line of defence, not the only one --
# it needs keyd-application-mapper running, and the shell has to stay usable
# when it isn't.
nav.a = C-a
nav.e = C-e
nav.b = C-b
nav.f = C-f
nav.p = C-p
nav.n = C-n

mac.c = C-S-c
mac.v = C-S-v
# new window
mac.n = C-S-n
# new tab
mac.t = C-S-t
# close tab
mac.w = C-S-w
# find
mac.f = C-S-f
# select all -- the default mac layer sends C-a, which nav.a has just handed
# back to the shell as the tmux prefix, so Cmd+A needs the shifted spelling too
mac.a = C-S-a

[foot]

nav.a = C-a
nav.e = C-e
nav.b = C-b
nav.f = C-f
nav.p = C-p
nav.n = C-n

mac.c = C-S-c
mac.v = C-S-v
mac.n = C-S-n
# foot's search-start default is Ctrl+Shift+R
mac.f = C-S-r

# --- Emacs -----------------------------------------------------------------
# Emacs already is the keybinding scheme both layers imitate, so every
# translation here is a collision rather than a convenience.
#
# The nav layer is the damaging one. C-f becomes `right`, which looks correct
# for a bare cursor move and destroys every sequence built on it: C-x C-f is
# find-file, and C-x <right> is next-buffer. C-x C-b goes the same way. A
# prefix key cannot survive being rewritten into an arrow.
#
# The mac layer collides differently: each Cmd chord arrives as the Ctrl chord
# emacs has already given a meaning. Cmd+W would emit C-w and kill the region
# instead of closing anything, Cmd+T would transpose characters, Cmd+A would go
# to line start. Handing each key back as M- restores what an unmapped key in a
# ':M' layer emits, so Super chords reach emacs untranslated and emacs decides
# what they mean.
#
# Terminal emacs needs nothing here: it runs inside a terminal, which has its
# own section above.

[emacs]

nav.a = C-a
nav.e = C-e
nav.b = C-b
nav.f = C-f
nav.p = C-p
nav.n = C-n

mac.c = M-c
mac.v = M-v
mac.x = M-x
mac.z = M-z
mac.a = M-a
mac.s = M-s
mac.f = M-f
mac.t = M-t
mac.n = M-n
mac.w = M-w
mac.r = M-r
mac.q = M-q

# --- Add more as needed ----------------------------------------------------
# Example: JetBrains IDEs ship their own macOS keymap; if you enable it there,
# you may want to drop the translation entirely for those windows by rebinding
# the keys back to their Super-prefixed originals, e.g.:
#
#   [jetbrains-idea]
#   mac.c = M-c

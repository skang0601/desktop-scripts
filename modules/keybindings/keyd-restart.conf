# systemd drop-in -> /etc/systemd/system/keyd.service.d/restart.conf
#
# keyd's packaged unit sets Restart=no, so a crash leaves the keyboard with no
# remapping until someone notices and restarts it by hand. keyd 2.6.0 does
# crash: two SIGSEGVs in process_event within 24h on this machine, one of them
# after 2h uptime and a 260MB memory peak for a daemon that sits at 36MB idle.
#
# Restarting is safe. keyd re-reads /etc/keyd/default.conf on start and grabs
# the input devices again; the cost of a spurious restart is a keystroke, and
# the cost of not restarting is a desktop with the mac layer gone.
#
# The per-application layer does NOT come back on its own: keyd-application-mapper
# holds bindings in the daemon's memory, and a restarted keyd knows nothing of
# them until the mapper pushes again on the next window focus change.

[Service]
Restart=always
RestartSec=1

# Five restarts in 10s is systemd's default before it gives up and leaves the
# unit failed. A crash loop against a broken config would hit that in seconds
# and then stay down, which is the state this drop-in exists to avoid, so the
# window is widened rather than the limit removed -- an actually unstartable
# keyd should still stop being retried.
StartLimitIntervalSec=300
StartLimitBurst=10

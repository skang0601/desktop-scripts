# keyd system config -> /etc/keyd/default.conf
#
# macOS-style modifiers on GNOME/Wayland. See docs/decisions/0002-macos-keybindings.md
#
# Two rules govern everything here:
#   1. Ctrl+C is SIGINT, always, everywhere, and no mapping may endanger that.
#   2. Super gains a modifier layer. Keys listed below are translated to the
#      Ctrl-based combo Linux apps actually listen for; every other key falls
#      through to GNOME still carrying Super, so GNOME's own Super bindings
#      (Super+Tab, Super+`, Super+space, Super+H) keep working.

[ids]
*

[main]
# keyd emits a clean meta down/up on an isolated tap of a layer key, so tap-Super
# still reaches GNOME's overlay-key. overload() is not an option here: `meta` is
# a left-hand-side alias and does not parse as an action.
meta = layer(mac)

# Emacs-style navigation on physical Ctrl, the other half of the macOS split:
# Cmd carries the editing verbs, Ctrl moves the cursor. This has to happen here
# rather than via GNOME's Emacs gtk-key-theme, because by the time a key reaches
# GTK the mac layer has already turned Cmd+A into a literal Ctrl+A -- nothing
# downstream can tell the two apart, so the key theme would capture both. It
# also only ships gtk-3.0, so it does nothing in GTK4 apps.
control = layer(nav)

[mac:M]
# The ':M' makes unmapped keys emit with Super still held, which is what lets
# GNOME keep Super+Tab and friends. A plain '[mac]' would drop Super.
#
# Explicit bindings are unaffected by the layer's own modifier, so `c = C-insert`
# emits Ctrl+Insert, not Super+Ctrl+Insert. Physically held modifiers still pass
# through: Super+Shift+T gives Ctrl+Shift+T.

# Comments go above a binding, never after it: keyd has no trailing-comment
# syntax and swallows the rest of the line into the action, so `c = C-insert
# # copy` parses as an invalid action and the binding is silently dropped.

# Ctrl+Insert / Shift+Insert rather than Ctrl+C / Ctrl+V: GTK4 binds both
# spellings (gtktext.c, gtktextview.c), so Cmd+C copies in GUI apps while
# Ctrl+C stays SIGINT everywhere.
#
# This does NOT reach terminals. Ptyxis ignores both Insert forms as
# accelerators, so Cmd+C and Cmd+V do nothing there and the clipboard needs
# Ctrl+Shift+C/V. Rebinding Ptyxis to the Insert spellings was tried and does
# not work; app.conf is the only route, and it needs a Layer 3 that has no
# working GNOME extension on Shell 50.
# Cmd+C  copy
c = C-insert
# Cmd+V  paste
v = S-insert
# Cmd+X  cut
x = S-delete

# Cmd+Z  undo
z = C-z
# Cmd+A  select all (consumes GNOME's Super+A app grid; ./gsettings.sh moves it)
a = C-a
# Cmd+S  save
s = C-s
# Cmd+F  find
f = C-f
# Cmd+T  new tab
t = C-t
# Cmd+N  new window
n = C-n
# Cmd+W  close tab/window
w = C-w
# Cmd+R  reload
r = C-r
# Cmd+Q  quit -- app-dependent; some apps implement no quit accelerator at all.
# Alt+F4 always closes.
q = C-q

# Left unmapped so GNOME keeps them:
#   Super+Tab    switch-applications  = Cmd+Tab      GNOME default
#   Super+`      switch-group         = Cmd+`        GNOME default
#   Super+H      minimize             = Cmd+H        GNOME default
#   Super+space  toggle-overview      = Cmd+Space    set by ./gsettings.sh

[nav:C]
# The ':C' keeps Ctrl on every key not listed, so Ctrl+C is still Ctrl+C and
# rule 1 holds by construction rather than by care.
#
# Deliberately absent: d, h, k, w, u, y. Those are EOF and readline editing in
# a shell, and a terminal only escapes this layer via app.conf, which needs
# keyd-application-mapper running. Anything mapped here has to be harmless in a
# terminal when that daemon is not up; Home and the arrows are, Delete is not.

# Ctrl+A  line start
a = home
# Ctrl+E  line end
e = end
# Ctrl+B  back one char
b = left
# Ctrl+F  forward one char
f = right
# Ctrl+P  previous line
p = up
# Ctrl+N  next line
n = down

[nav+shift]
# A nav binding fires whatever else is physically held, so without this section
# Shift merely rides along and Ctrl+Shift+P arrives as Shift+Up -- taking with it
# Firefox's private window, VS Code's command palette and Ctrl+Shift+F everywhere.
# Shift+arrow already extends a selection natively, so the nav layer gives up
# nothing by ceding the shifted combos back to the application.
#
# A composite layer wins over its constituents while both are active, and must be
# defined after them. Composite layers take no ':' modifier of their own, so each
# key restates the modifiers it emits.
a = C-S-a
e = C-S-e
b = C-S-b
f = C-S-f
p = C-S-p
n = C-S-n

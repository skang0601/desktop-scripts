# keyd system config -> /etc/keyd/default.conf
#
# macOS-style modifiers on GNOME/Wayland. See docs/decisions/0002-macos-keybindings.md
#
# Two rules govern everything here:
#   1. Physical Ctrl is never mapped. Ctrl+C is SIGINT, always, everywhere.
#   2. Super gains a modifier layer. Keys listed below are translated to the
#      Ctrl-based combo Linux apps actually listen for; every other key falls
#      through to GNOME still carrying Super, so GNOME's own Super bindings
#      (Super+Tab, Super+`, Super+space, Super+H) keep working.

[ids]
*

[main]
# keyd emits a clean meta down/up on an isolated tap of a layer key, so tap-Super
# still reaches GNOME's overlay-key. overload() is not an option here: `meta` is
# a left-hand-side alias and does not parse as an action.
meta = layer(mac)

[mac:M]
# The ':M' makes unmapped keys emit with Super still held, which is what lets
# GNOME keep Super+Tab and friends. A plain '[mac]' would drop Super.
#
# Explicit bindings are unaffected by the layer's own modifier, so `c = C-insert`
# emits Ctrl+Insert, not Super+Ctrl+Insert. Physically held modifiers still pass
# through: Super+Shift+T gives Ctrl+Shift+T.

# Ctrl+Insert / Shift+Insert rather than Ctrl+C / Ctrl+V: GTK4 binds both
# spellings (gtktext.c, gtktextview.c) and many terminals accept the Insert
# forms, so copy/paste works in a terminal even before app.conf is active.
# Whether Ptyxis and foot accept them is unverified.
c = C-insert       # Cmd+C  copy
v = S-insert       # Cmd+V  paste
x = S-delete       # Cmd+X  cut

z = C-z            # Cmd+Z  undo
a = C-a            # Cmd+A  select all  (consumes GNOME's Super+A app grid;
                   #                     ./gsettings.sh moves it)
s = C-s            # Cmd+S  save
f = C-f            # Cmd+F  find
t = C-t            # Cmd+T  new tab
n = C-n            # Cmd+N  new window
w = C-w            # Cmd+W  close tab/window
r = C-r            # Cmd+R  reload
q = C-q            # Cmd+Q  quit -- app-dependent; some apps implement no quit
                   #                accelerator at all. Alt+F4 always closes.

# Left unmapped so GNOME keeps them:
#   Super+Tab    switch-applications  = Cmd+Tab      GNOME default
#   Super+`      switch-group         = Cmd+`        GNOME default
#   Super+H      minimize             = Cmd+H        GNOME default
#   Super+space  toggle-overview      = Cmd+Space    set by ./gsettings.sh

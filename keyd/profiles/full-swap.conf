# keyd system config -- "full-swap" profile (ALTERNATIVE, not installed by default)
#
# Physical Super acts as Ctrl for EVERY key, which is the closest thing to real
# macOS muscle memory: Super+<anything> just works, no per-key whitelist to
# maintain.
#
# Cost: GNOME's own Super shortcuts (Super+Left tile, Super+A app grid,
# Super+1..9 dock) are all consumed. Re-bind the ones you want under
# Settings > Keyboard > Keyboard Shortcuts, or use gnome/gsettings.sh.
#
# Physical Ctrl is still untouched -- Ctrl+C remains SIGINT.
#
# Activate with: scripts/install-keyd.sh full-swap
# See docs/decisions/0003-super-as-primary-gui-modifier.md

[ids]
*

[main]
# Tap Super -> real Super (overview); hold Super -> behaves as Ctrl
meta = overload(mac, meta)

[mac:C]
# ':C' makes this layer carry the Ctrl modifier, so every unlisted key in the
# layer is emitted as Ctrl+<key> automatically.
q = A-f4           # Cmd+Q -> quit, not Ctrl+Q
h = A-f9           # Cmd+H -> minimize (GNOME 'minimize' binding)
space = A-f1       # Cmd+Space -> Activities/search, Spotlight-ish

# keyd system config -- "whitelist" profile (DEFAULT)
#
# Physical Super becomes a macOS-style Command key for a hand-picked set of
# actions. Every Super combo NOT listed below falls through to GNOME unchanged,
# so Super+Left (tile), Super+A (app grid), Super+1..9 (dock) keep working.
#
# Physical Ctrl is deliberately left untouched -- Ctrl+C must always be SIGINT.
#
# Installed to /etc/keyd/default.conf by scripts/install-keyd.sh
# See docs/decisions/0003-super-as-primary-gui-modifier.md

[ids]
*

[main]
# Tap Super  -> real Super (GNOME Activities overview)
# Hold Super -> mac_shortcuts layer
meta = overload(mac_shortcuts, meta)

[mac_shortcuts]
c = C-insert       # Copy   (Ctrl+Insert works in terminals AND GUI apps)
v = S-insert       # Paste  (Shift+Insert likewise)
x = C-x            # Cut
a = C-a            # Select all
z = C-z            # Undo
s = C-s            # Save
f = C-f            # Find
t = C-t            # New tab
n = C-n            # New window
w = C-w            # Close tab/window
r = C-r            # Reload
q = A-f4           # Quit application

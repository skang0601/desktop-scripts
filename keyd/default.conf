# keyd system config -> /etc/keyd/default.conf
#
# macOS-style modifiers on GNOME/Wayland. See docs/decisions/0002-macos-keybindings.md
#
# Two rules govern everything here:
#   1. Physical Ctrl is never mapped. Ctrl+C is SIGINT, always, everywhere.
#   2. Super gains a modifier layer. Keys listed below are translated to the
#      Ctrl-based combo Linux apps actually listen for; every other key falls
#      through to GNOME still carrying Super, so GNOME's own Super bindings
#      (Super+Tab, Super+`, Super+space, Super+H) keep working.

[ids]
*

[main]
# NOT overload(). `meta` is a left-hand-side alias, not a key name -- keyd
# rejects `overload(mac, meta)` outright, and `overload(mac, leftmeta)` gets
# silently rewritten to layer(meta), which never opens the overview.
#
# Plain layer() is correct: keyd special-cases an isolated tap of a layer key
# and emits a clean meta down/up pair, so tap-Super still opens Activities.
meta = layer(mac)

[mac:M]
# ':M' makes this a modifier layer -- unmapped keys are emitted WITH Super held,
# which is what preserves GNOME's shortcuts. A plain '[mac]' would swallow Super
# and break Super+Tab.
#
# Explicit bindings below are NOT affected by the layer's own M modifier:
# `c = C-insert` emits exactly Ctrl+Insert, not Super+Ctrl+Insert. Extra
# modifiers you physically hold do pass through, so Super+Shift+T correctly
# becomes Ctrl+Shift+T.

# Clipboard. Ctrl+Insert / Shift+Insert rather than Ctrl+C / Ctrl+V: GTK4 binds
# both spellings (gtktext.c, gtktextview.c), and the Insert forms are also
# accepted by many terminals -- so this degrades sanely before the per-app layer
# (app.conf) is working. Verify in your terminal; see ADR 0002.
c = C-insert       # Cmd+C  copy
v = S-insert       # Cmd+V  paste
x = S-delete       # Cmd+X  cut

z = C-z            # Cmd+Z  undo
a = C-a            # Cmd+A  select all  (consumes GNOME's Super+A app grid;
                   #                     gnome/gsettings.sh moves it)
s = C-s            # Cmd+S  save
f = C-f            # Cmd+F  find
t = C-t            # Cmd+T  new tab
n = C-n            # Cmd+N  new window
w = C-w            # Cmd+W  close tab/window
r = C-r            # Cmd+R  reload
q = C-q            # Cmd+Q  quit -- app-dependent; some apps implement no quit
                   #                accelerator at all. Alt+F4 always closes.

# Deliberately NOT mapped, so GNOME keeps them (already macOS-shaped by default):
#   Super+Tab    switch-applications   = Cmd+Tab
#   Super+`      switch-group          = Cmd+`
#   Super+space  toggle-overview       = Cmd+Space
#   Super+H      minimize              = Cmd+H
